# ── Architecture ──────────────────────────────────────────────────────────────
arch: transformer
d_model: 512
n_heads: 8
n_layers: 8
ffn_dim: 2048
dropout: 0.1

# ── Training ──────────────────────────────────────────────────────────────────
lr: 0.0001
